<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals 70%</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-base);font-family:var(--font-body);color:var(--fg-2)}
  .wrap{padding:20px 24px}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-xs)}
  .chip{height:68px}
  .meta{padding:8px 10px 10px;background:var(--bg-base);border-top:1px solid var(--divider)}
  .name{font-size:11px;letter-spacing:.02em;color:var(--fg-2);font-weight:500}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-4);margin-top:2px}
  .tag{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-4);margin-bottom:10px}
</style></head>
<body>
  <div class="wrap">
    <div class="tag">70% — surfaces &amp; neutrals</div>
    <div class="row">
      <div class="sw"><div class="chip" style="background:#FAF9F5;border:1px solid var(--divider)"></div><div class="meta"><div class="name">bg-base</div><div class="hex">#FAF9F5</div></div></div>
      <div class="sw"><div class="chip" style="background:#F3F1EB"></div><div class="meta"><div class="name">bg-raised</div><div class="hex">#F3F1EB</div></div></div>
      <div class="sw"><div class="chip" style="background:#EAEAE6"></div><div class="meta"><div class="name">gray-100</div><div class="hex">#EAEAE6</div></div></div>
      <div class="sw"><div class="chip" style="background:#D4D2CA"></div><div class="meta"><div class="name">gray-200</div><div class="hex">#D4D2CA</div></div></div>
      <div class="sw"><div class="chip" style="background:#B8B6AE"></div><div class="meta"><div class="name">gray-300</div><div class="hex">#B8B6AE</div></div></div>
      <div class="sw"><div class="chip" style="background:#8A8880"></div><div class="meta"><div class="name">gray-400</div><div class="hex">#8A8880</div></div></div>
    </div>
  </div>
</body></html>
