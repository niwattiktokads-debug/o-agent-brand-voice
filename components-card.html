<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:linear-gradient(130deg,#EAEAE6,#D4D2CA);padding:22px 24px;font-family:var(--font-body);color:var(--fg-2);min-height:100vh;box-sizing:border-box}
  .eb{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-4);margin-bottom:14px}
  .card{max-width:420px;background:rgba(250,249,245,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:6px;padding:20px 22px;box-shadow:0 2px 6px rgba(10,10,9,.05),0 1px 2px rgba(10,10,9,.04)}
  .card h3{margin:0 0 4px;font-family:'IBM Plex Serif',serif;font-weight:400;font-size:22px;color:var(--fg-1);letter-spacing:-0.01em}
  .card .sub{font-size:13px;color:var(--fg-3);margin-bottom:14px}
  .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(10,10,9,.08);font-size:13px}
  .row:last-child{border:0}
  .k{color:var(--fg-3)}
  .v{font-family:'IBM Plex Mono',monospace;color:var(--fg-1);font-variant-numeric:tabular-nums}
</style></head>
<body>
  <div class="eb">Card · panel-85 · backdrop-blur · shadow-sm · no border</div>
  <div class="card">
    <h3>TikTok Shop · วันนี้</h3>
    <div class="sub">Live orders · 14:22 ICT</div>
    <div class="row"><span class="k">Orders</span><span class="v">238</span></div>
    <div class="row"><span class="k">Revenue</span><span class="v">฿84,210</span></div>
    <div class="row"><span class="k">ROAS</span><span class="v">3.42×</span></div>
  </div>
</body></html>
