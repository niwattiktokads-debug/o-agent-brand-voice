<!doctype html>
<html><head><meta charset="utf-8"><title>Dark + Black 20/10</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-base);font-family:var(--font-body);color:var(--fg-2)}
  .wrap{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .group .tag{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-4);margin-bottom:10px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .sw{border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-xs)}
  .chip{height:84px}
  .meta{padding:8px 10px 10px;background:var(--bg-base);border-top:1px solid var(--divider)}
  .name{font-size:11px;letter-spacing:.02em;color:var(--fg-2);font-weight:500}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-4);margin-top:2px}
</style></head>
<body>
  <div class="wrap">
    <div class="group">
      <div class="tag">20% — charcoal · primary text</div>
      <div class="row">
        <div class="sw"><div class="chip" style="background:#3A3A38"></div><div class="meta"><div class="name">charcoal</div><div class="hex">#3A3A38</div></div></div>
        <div class="sw"><div class="chip" style="background:#4A4844"></div><div class="meta"><div class="name">charcoal-warm</div><div class="hex">#4A4844</div></div></div>
      </div>
    </div>
    <div class="group">
      <div class="tag">10% — pure black · CTAs, logo</div>
      <div class="row" style="grid-template-columns:1fr">
        <div class="sw"><div class="chip" style="background:#0A0A09;height:84px"></div><div class="meta"><div class="name">black</div><div class="hex">#0A0A09</div></div></div>
      </div>
    </div>
  </div>
</body></html>
