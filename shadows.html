<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-base);padding:26px 24px;font-family:var(--font-body);color:var(--fg-2)}
  .eb{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-4);margin-bottom:20px}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .box{height:80px;background:#FAF9F5;border-radius:6px}
  .xs{box-shadow:0 1px 2px rgba(10,10,9,.04)}
  .sm{box-shadow:0 2px 6px rgba(10,10,9,.05),0 1px 2px rgba(10,10,9,.04)}
  .md{box-shadow:0 6px 18px rgba(10,10,9,.06),0 2px 6px rgba(10,10,9,.04)}
  .lg{box-shadow:0 14px 40px rgba(10,10,9,.08),0 4px 12px rgba(10,10,9,.05)}
  .lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--fg-4);margin-top:10px;text-align:center;letter-spacing:.02em}
  .nm{font-size:11px;color:var(--fg-3);text-align:center;margin-top:2px}
</style></head>
<body>
  <div class="eb">Soft layered shadows · no hard edges</div>
  <div class="row">
    <div><div class="box sm"></div><div class="lbl">shadow-sm</div><div class="nm">cards, inputs</div></div>
    <div><div class="box md"></div><div class="lbl">shadow-md</div><div class="nm">floating panels</div></div>
    <div><div class="box lg"></div><div class="lbl">shadow-lg</div><div class="nm">modals, popovers</div></div>
  </div>
</body></html>
