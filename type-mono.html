<!doctype html>
<html><head><meta charset="utf-8"><title>Mono numerals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-base);padding:22px 24px;font-family:var(--font-body);color:var(--fg-2)}
  .eb{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-4);margin-bottom:14px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .m{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
  .big{font-size:34px;color:var(--fg-1);letter-spacing:-0.01em}
  .lbl{font-size:11px;color:var(--fg-4);margin-top:4px;letter-spacing:.02em}
  .chg{font-size:12px;color:var(--accent-green);margin-top:2px}
  .chg.down{color:var(--accent-terracotta)}
</style></head>
<body>
  <div class="eb">Tabular numerals · IBM Plex Mono</div>
  <div class="grid">
    <div><div class="m big">฿142,380</div><div class="lbl">Revenue · 7d</div><div class="m chg">+18.4%</div></div>
    <div><div class="m big">3.42×</div><div class="lbl">ROAS</div><div class="m chg">+0.21</div></div>
    <div><div class="m big">00:04:18</div><div class="lbl">Avg response</div><div class="m chg down">−07s</div></div>
  </div>
</body></html>
