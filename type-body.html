<!doctype html>
<html><head><meta charset="utf-8"><title>Body type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-base);padding:22px 24px;font-family:var(--font-body);color:var(--fg-2)}
  .row{display:grid;grid-template-columns:72px 1fr;gap:18px;padding:10px 0;border-bottom:1px solid var(--divider)}
  .row:last-child{border-bottom:0}
  .key{font-family:var(--font-mono);font-size:10px;color:var(--fg-4);letter-spacing:.02em;padding-top:4px}
  .a{font-size:16px;line-height:1.55;color:var(--fg-2)}
  .b{font-size:14px;line-height:1.55;color:var(--fg-3)}
  .c{font-size:12px;line-height:1.4;color:var(--fg-4);letter-spacing:.02em}
  .eb{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-4);margin-bottom:10px}
</style></head>
<body>
  <div class="eb">Body · Inter / IBM Plex Sans Thai Looped</div>
  <div class="row"><div class="key">16 / 1.55</div><div class="a">An agent runs campaigns while you sleep. เปิดไว้ทั้งคืน.</div></div>
  <div class="row"><div class="key">14 / 1.55</div><div class="b">Connect TikTok Shop and Shopee in one step. ระบบเรียนรู้ร้านของคุณ</div></div>
  <div class="row"><div class="key">12 / 1.4</div><div class="c">Last synced 3 min ago · Updated by workflow</div></div>
</body></html>
