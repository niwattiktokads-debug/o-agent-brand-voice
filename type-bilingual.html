<!doctype html>
<html><head><meta charset="utf-8"><title>Bilingual pairing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-base);padding:22px 24px;font-family:var(--font-body);color:var(--fg-2)}
  .eb{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-4);margin-bottom:12px}
  .pair{display:grid;grid-template-columns:1fr 1px 1fr;gap:22px;align-items:start}
  .sep{background:var(--divider);width:1px;height:100%}
  .en{font-family:'IBM Plex Serif',serif;font-size:28px;line-height:1.15;letter-spacing:-0.015em;color:var(--fg-1);font-weight:400}
  .th{font-family:'IBM Plex Sans Thai Looped',sans-serif;font-size:26px;line-height:1.35;color:var(--fg-1);font-weight:400}
  .sub{font-size:11px;color:var(--fg-4);margin-top:10px;letter-spacing:.02em}
  .note{font-family:'IBM Plex Serif',serif;font-style:italic;color:var(--fg-3);margin-top:18px;font-size:13px}
</style></head>
<body>
  <div class="eb">Bilingual hierarchy · Thai as primary citizen</div>
  <div class="pair">
    <div>
      <div class="en">Run ads while you sleep.</div>
      <div class="sub">Latin · IBM Plex Serif 28/1.15</div>
    </div>
    <div class="sep"></div>
    <div>
      <div class="th">ยิงแอดตอนหลับ agent ดูแลให้</div>
      <div class="sub">Thai · IBM Plex Sans Thai Looped 26/1.35</div>
    </div>
  </div>
  <div class="note">Set Thai with equal or greater prominence — never as a smaller translation.</div>
</body></html>
