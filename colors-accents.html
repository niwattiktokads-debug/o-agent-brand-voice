<!doctype html>
<html><head><meta charset="utf-8"><title>Accents &lt;5%</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-base);font-family:var(--font-body);color:var(--fg-2)}
  .wrap{padding:20px 24px}
  .tag{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-4);margin-bottom:6px}
  .sub{font-size:12px;color:var(--fg-3);margin-bottom:14px;font-family:var(--font-display);font-style:italic}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .sw{border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-xs)}
  .chip{height:70px}
  .meta{padding:8px 10px 10px;background:var(--bg-base);border-top:1px solid var(--divider)}
  .name{font-size:11px;letter-spacing:.02em;color:var(--fg-2);font-weight:500}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-4);margin-top:2px}
</style></head>
<body>
  <div class="wrap">
    <div class="tag">&lt;5% combined — accents, one at a time</div>
    <div class="sub">Used sparingly, where brand energy is required. Never two at once.</div>
    <div class="row">
      <div class="sw"><div class="chip" style="background:#8A3E2A"></div><div class="meta"><div class="name">terracotta-deep</div><div class="hex">#8A3E2A</div></div></div>
      <div class="sw"><div class="chip" style="background:#B4553A"></div><div class="meta"><div class="name">terracotta</div><div class="hex">#B4553A</div></div></div>
      <div class="sw"><div class="chip" style="background:#D48668"></div><div class="meta"><div class="name">terracotta-light</div><div class="hex">#D48668</div></div></div>
    </div>
  </div>
</body></html>
