<!doctype html>
<html><head><meta charset="utf-8"><title>Display specimen</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-base);padding:24px;font-family:var(--font-body)}
  .eyebrow{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-4);margin-bottom:14px}
  .sample{font-family:var(--font-display);font-weight:400;font-size:56px;line-height:1.05;letter-spacing:-0.02em;color:var(--fg-1);text-wrap:balance}
  .thai{font-family:'IBM Plex Sans Thai Looped','IBM Plex Serif',serif;font-weight:300;font-size:46px;line-height:1.18;color:var(--fg-1);margin-top:10px}
  .meta{display:flex;gap:18px;margin-top:16px;padding-top:12px;border-top:1px solid var(--divider);font-family:var(--font-mono);font-size:10px;color:var(--fg-4);letter-spacing:.02em}
</style></head>
<body>
  <div class="eyebrow">Display · editorial serif</div>
  <div class="sample">Automate what eats your mornings.</div>
  <div class="thai">อะไรที่กิน<em>เวลา</em>ของคุณ ให้ agent ทำแทน</div>
  <div class="meta"><span>IBM Plex Serif / IBM Plex Sans Thai Looped</span><span>56 / 46 px</span><span>tracking -0.02em</span></div>
</body></html>
